[tools]
python = "3.12"
uv = "latest"

[env]
_.file = ".env"

[tasks.migrate]
description = "Apply database migrations"
run = "docker compose run --rm api uv run alembic upgrade head"

[tasks.lint]
description = "Run pre-commit on backend"
run = [
  "uv sync --directory backend --all-groups",
  "uv run --directory backend pre-commit run --all-files",
]

[tasks.test]
description = "Lint, typecheck and pytest in Docker"
depends = ["lint"]
run = [
  "docker compose build api",
  "docker compose run --rm --no-deps api uv run mypy",
  "docker compose run --rm api uv run alembic upgrade head",
  "docker compose run --rm api uv run pytest -q",
]

[tasks.dev]
description = "Install hooks, lint and start dev stack"
depends = ["lint"]
run = [
  "uv run --directory backend pre-commit install",
  "docker compose --profile dev up --build",
]

[tasks.up]
description = "Start prod-like stack with nginx"
run = [
  "LOG_FORMAT=json DOCS_ENABLED=false UVICORN_RELOAD= COMPOSE_PROFILES=prod docker compose --profile prod up -d --build",
  "docker compose exec -T api uv run alembic upgrade head",
]

[tasks.down]
description = "Stop all stacks"
run = "docker compose --profile dev --profile prod down --remove-orphans"
