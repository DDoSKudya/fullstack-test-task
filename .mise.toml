[tools]
python = "3.12"
uv = "latest"

[env]
_.file = ".env"

[tasks.migrate]
description = "Apply database migrations"
run = "docker compose run --rm backend uv run alembic upgrade head"

[tasks.lint]
description = "Run pre-commit on all tracked files"
run = [
  "uv sync --directory backend --all-groups",
  "uv run --directory backend pre-commit run --all-files",
]

[tasks.test]
description = "Lint, typecheck, tests with coverage and prod build"
depends = ["lint"]
run = [
  "docker compose build backend",
  "docker compose --profile prod build frontend",
  "docker compose run --rm --no-deps backend uv run mypy",
  "docker compose run --rm backend uv run alembic upgrade head",
  "docker compose run --rm backend uv run pytest -q --cov=src --cov-fail-under=85 --cov-report=term-missing",
  "npm --prefix frontend ci",
  "npm --prefix frontend run typecheck",
  "npm --prefix frontend run test",
  "npm --prefix frontend run build",
]

[tasks.dev]
description = "Install hooks, lint and start dev stack"
depends = ["lint"]
run = [
  "uv run --directory backend pre-commit install",
  "docker compose --profile dev up --build",
]

[tasks.up]
description = "Start prod-like stack with nginx"
run = [
  "docker compose --profile dev --profile prod down --remove-orphans || true",
  "LOG_FORMAT=json DOCS_ENABLED=false UVICORN_RELOAD= docker compose --profile prod up -d --build",
  "docker compose --profile prod run --rm backend uv run alembic upgrade head",
  "echo 'App: http://localhost  |  Health: http://localhost/health'",
]

[tasks.down]
description = "Stop all stacks"
run = "docker compose --profile dev --profile prod down --remove-orphans"
