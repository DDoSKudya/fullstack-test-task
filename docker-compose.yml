services:
  api:
    build: ./backend
    command: >
      sh -c "uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 $${UVICORN_RELOAD}"
    volumes:
      - ./backend:/app
      - file_storage:/data/files
    env_file: .env
    environment:
      LOG_FORMAT: ${LOG_FORMAT}
      DOCS_ENABLED: ${DOCS_ENABLED}
      UVICORN_RELOAD: ${UVICORN_RELOAD}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: uv run taskiq worker src.worker.broker:broker src.worker.tasks
    volumes:
      - ./backend:/app
      - file_storage:/data/files
    env_file: .env
    environment:
      LOG_FORMAT: ${LOG_FORMAT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fileexchange"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    profiles: [dev]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  frontend-prod:
    profiles: [prod]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"

  nginx:
    profiles: [prod]
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend-prod

volumes:
  pg_data:
  file_storage:
