name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare env
        run: cp .env.dev .env

      - name: Install backend tools
        run: uv sync --directory backend --all-groups

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Pre-commit
        run: uv run --directory backend pre-commit run --all-files

  backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Prepare env
        run: cp .env.dev .env

      - name: Build backend image
        run: docker compose build backend

      - name: Typecheck
        run: docker compose run --rm --no-deps backend uv run mypy

      - name: Migrate
        run: docker compose run --rm backend uv run alembic upgrade head

      - name: Test with coverage
        run: >
          docker compose run --rm backend
          uv run pytest -q
          --cov=src
          --cov-fail-under=85
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm --prefix frontend ci

      - name: Typecheck
        run: npm --prefix frontend run typecheck

      - name: Test with coverage
        run: npm --prefix frontend run test

      - name: Build
        run: npm --prefix frontend run build

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: error
