name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Prepare env
        run: cp .env.dev .env

      - name: Build API image
        run: docker compose -f docker-compose.dev.yml build api

      - name: Lint
        run: mise run lint

      - name: Test
        run: mise run test
